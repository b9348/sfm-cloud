<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>SFM Cloud API</title>
</head>
<body>
    <h1>SFM Cloud API Server</h1>
    <p>API endpoints:</p>
    <ul>
        <li>POST /api/auth/register - 用户注册</li>
        <li>POST /api/auth/login - 用户登录</li>
        <li>GET /api/mods/list - Mod列表</li>
        <li>GET /api/mods/detail/{mod_id} - Mod详情</li>
        <li>POST /api/mods/create - 创建Mod</li>
        <li>GET /api/user/profile - 用户资料</li>
    </ul>
    <p>Status: <span id="status">Checking...</span></p>
    <script>
        fetch('/api/mods/list')
            .then(r => r.json())
            .then(d => document.getElementById('status').textContent = 'API OK')
            .catch(e => document.getElementById('status').textContent = 'API Error: ' + e.message);
    </script>
</body>
</html>
